apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  namespace: default
data:
  APP_ENV: "production"
  APP_SERVER_PORT: "8080"
  APP_DATABASE_HOST: "your-rds-endpoint.amazonaws.com"
  APP_DATABASE_PORT: "5432"
  APP_DATABASE_USER: "productapp"
  APP_DATABASE_DBNAME: "productsystem"
  APP_DATABASE_SSLMODE: "require"
  APP_REDIS_URL: "redis://your-elasticache-endpoint:6379"
  APP_STORAGE_DRIVER: "s3"
  APP_STORAGE_S3_ENDPOINT: "https://s3.ap-northeast-1.amazonaws.com"
  APP_STORAGE_S3_BUCKET: "your-app-bucket"
  APP_STORAGE_S3_REGION: "ap-northeast-1"
