apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-app
  namespace: default
  labels:
    app: ecommerce-app
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ecommerce-app
  template:
    metadata:
      labels:
        app: ecommerce-app
    spec:
      containers:
        - name: app
          image: ${ECR_REPO}:${IMAGE_TAG:-latest}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_ENV
            - name: APP_SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_SERVER_PORT
            - name: APP_DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_DATABASE_HOST
            - name: APP_DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_DATABASE_PORT
            - name: APP_DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_DATABASE_USER
            - name: APP_DATABASE_DBNAME
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_DATABASE_DBNAME
            - name: APP_DATABASE_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_DATABASE_SSLMODE
            - name: APP_REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_REDIS_URL
            - name: APP_STORAGE_DRIVER
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_STORAGE_DRIVER
            - name: APP_STORAGE_S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_STORAGE_S3_ENDPOINT
            - name: APP_STORAGE_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_STORAGE_S3_BUCKET
            - name: APP_STORAGE_S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: APP_STORAGE_S3_REGION
            # Sensitive values from Secret
            - name: APP_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secret
                  key: database_password
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secret
                  key: jwt_secret
            - name: APP_STORAGE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secret
                  key: s3_access_key
            - name: APP_STORAGE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secret
                  key: s3_secret_key
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
